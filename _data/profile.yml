intro:
  en: "My work focuses on scalable quantum computing systems, with particular interest in photonic error correction, distributed entanglement, and the evaluation infrastructure required for reproducible experimental research."
  zh: "我的研究主要关注可扩展量子计算系统，尤其是光子纠错、分布式纠缠，以及支撑可复现实验研究所需的评测基础设施。"

bio:
  en: "My research sits at the intersection of **quantum computing**, **network systems**, and **research tooling**. I work on the point where theory becomes deployable infrastructure: not only whether a method is correct in principle, but whether it can be reproduced, benchmarked, and extended by other groups.\n\nThis site is structured to foreground the material that usually matters most on an academic homepage: research themes, selected publications, software projects, recent updates, and direct paths for contact."
  zh: "我的研究位于**量子计算**、**网络系统**和**科研工具链**的交叉处。我关注的是理论走向可部署基础设施的过程，不仅关心方法在原理上是否成立，也关心它能否被复现、被系统评测，并被其他研究团队继续扩展。\n\n这个主页的结构也围绕学术网站最重要的信息展开：研究主题、代表性论文、科研项目、近期动态，以及清晰的联系入口。"

status:
  en: "Open to academic collaboration on quantum networking, error correction benchmarks, and research infrastructure."
  zh: "欢迎围绕量子网络、纠错基准与科研基础设施开展学术合作。"

