<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.data.profile.name }}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>

<body class="layout-{{ site.theme_layout | default: 'notion' }} lang-en">
    
    <div class="global-controls">
        <button onclick="toggleLang()" class="ctrl-btn" title="Switch Language">中文 / EN</button>
        <button onclick="toggleTheme()" class="ctrl-btn" id="theme-icon" title="Toggle Dark/Light Mode">🌙</button>
    </div>

    <div class="page-wrapper">
        
        <aside class="profile-card">
            <img src="{{ site.data.profile.avatar }}" alt="Profile" class="avatar">
            
            <div class="profile-info">
                <h1>{{ site.data.profile.name }}</h1>
                
                <p class="tagline lang-en">{{ site.data.profile.tagline.en }}</p>
                <p class="tagline lang-zh">{{ site.data.profile.tagline.zh }}</p>
                
                <div class="links">
                    <a href="mailto:{{ site.data.profile.email }}">Email</a>
                    <a href="#">GitHub</a>
                    <a href="#">Scholar</a>
                </div>
            </div>
        </aside>

        <main class="markdown-content">
            {{ content }}
        </main>

    </div>

    <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
